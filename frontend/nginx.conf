server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # PyFlowHub WebSocket（决策 5：/ws 长连接，BackendConfig timeout 由 Ingress 控制）
    location ^~ /lhy-styon-pyflow/ws/ {
        proxy_pass http://pyflow-hub:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # PyFlowHub REST（决策 5：统一前缀 /lhy-styon-pyflow）
    location ^~ /lhy-styon-pyflow/ {
        proxy_pass http://pyflow-hub:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
