# 基线 egress deny-all（决策 1/14）：pyflow-blocks 命名空间内所有 Pod 默认禁止出网，
# 各 Block 由 manifest_generator 生成的 NetworkPolicy 按白名单放行：
#   kube-dns(53) / Private Google Access(443) / 中间件接入（lhy-styon ns 的 RabbitMQ·MinIO·ES·Nacos
#   + VPC 私网 Redis(6379)·Cloud SQL(5432)，由 PYFLOW_MIDDLEWARE_* / PYFLOW_BLOCK_EGRESS_CIDRS 配置）。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pyflow-default-deny-egress
  namespace: pyflow-blocks
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress: []
