# 块运行时中间件连接 Secret 模板（pyflow-block-middleware）
# ─────────────────────────────────────────────────────────────────────────────
# 作用：让中台启动的 Flow / 调用块（pyflow-blocks 命名空间）连到集群内 redis/mq/db/minio。
#
# 两种获得方式（二选一）：
#   1) 自动渲染（推荐）：保持 PYFLOW_BLOCK_INJECT_MIDDLEWARE=true，orchestrator 在「一键部署」时
#      从控制面 block_*/redis_url/rabbitmq_url/db_dsn/minio_* 派生并 apply 本 Secret，无需手动创建。
#   2) 手动创建：若希望块连接与控制面不同（如连业务库 ai_outfit），手动创建本 Secret 覆盖。
#
# 块内 Python 代码按约定读取（os.environ["DATABASE_URL"] 等）。CICD 不 apply 本 Secret，避免覆盖真实凭据。
#
# 手动创建命令示例（值替换为真实地址/凭据，地址见 .env.example 速查表）：
#   kubectl create secret generic pyflow-block-middleware -n pyflow-blocks \
#     --from-literal=REDIS_URL='redis://10.0.1.11:6379/0' \
#     --from-literal=RABBITMQ_URL='amqp://lhy-styon:<PWD>@rabbitmq.lhy-styon.svc.cluster.local:5672//lhy-styon' \
#     --from-literal=DATABASE_URL='postgresql://lhy_app:<PWD>@10.196.0.3:5432/ai_outfit' \
#     --from-literal=MINIO_ENDPOINT='minio.lhy-styon.svc.cluster.local:9000' \
#     --from-literal=MINIO_ACCESS_KEY='minioadmin' \
#     --from-literal=MINIO_SECRET_KEY='<PWD>'
apiVersion: v1
kind: Secret
metadata:
  name: pyflow-block-middleware
  namespace: pyflow-blocks
type: Opaque
stringData:
  REDIS_URL: "redis://10.0.1.11:6379/0"
  RABBITMQ_URL: "amqp://lhy-styon:CHANGE_ME@rabbitmq.lhy-styon.svc.cluster.local:5672//lhy-styon"
  DATABASE_URL: "postgresql://lhy_app:CHANGE_ME@10.196.0.3:5432/ai_outfit"
  MINIO_ENDPOINT: "minio.lhy-styon.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "CHANGE_ME"
